# Deploy from repository root (works even if Dashboard "Root Directory" is left blank).
# Build installs backend deps; start.sh cds into backend/ so `app` imports resolve.
services:
  - type: web
    name: etac-backend
    runtime: python
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: bash start.sh
    envVars:
      - key: HAPPYROBOT_API_KEY
        sync: false
      - key: HAPPYROBOT_BASE_URL
        value: https://platform.eu.happyrobot.ai/api/v2
      - key: APP_ENV
        value: production
      - key: CORS_ORIGINS
        value: "*"
